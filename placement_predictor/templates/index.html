<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Placement Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number" step="0.01" name="cgpa" placeholder="CGPA" required>

        <input type="number" name="internships" placeholder="Internships" required>

        <input type="number" name="projects" placeholder="Projects" required>

        <input type="number" name="workshops" placeholder="Workshops / Certifications" required>

        <input type="number" step="0.01" name="aptitude" placeholder="Aptitude Score" required>

        <input type="number" step="0.01" name="communication" placeholder="Soft Skills / Communication" required>

        <!-- YES / NO FIXED -->
        <label>Extracurricular Activities</label>
        <select name="extracurricular" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Placement Training</label>
        <select name="training" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <input type="number" step="0.01" name="ssc" placeholder="SSC Marks" required>

        <input type="number" step="0.01" name="hsc" placeholder="HSC Marks" required>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction }}</h2>

</div>

</body>
</html>
